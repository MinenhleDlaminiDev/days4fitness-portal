services:
  postgres:
    image: postgres:16
    container_name: days4fitness-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: days4fitness
    ports:
      - "5433:5432"
    volumes:
      - days4fitness_postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d days4fitness"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  days4fitness_postgres_data:
